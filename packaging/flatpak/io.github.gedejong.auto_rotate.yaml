# Flathub manifest for Auto-Rotate.
#
# The Python dependency module (python3-deps.json) is generated by flatpak-pip-generator
# from requirements.txt — see .github/workflows/flatpak.yml and packaging/README.md. It is
# committed so Flathub can build offline. The app itself (a pure-Python wheel) is included
# in that set; this manifest only adds the desktop/metadata files on top.
#
# Note: Tesseract is not bundled, so orientation/OCR are unavailable inside the sandbox;
# deskew and the black-on-white cleanup work.
id: io.github.gedejong.auto_rotate
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: auto-rotate-gui
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home
cleanup:
  - /include
  - /lib/pkgconfig
  - '*.a'
modules:
  - python3-deps.json
  - name: auto-rotate-metadata
    buildsystem: simple
    build-commands:
      - install -Dm644 io.github.gedejong.auto_rotate.desktop
        /app/share/applications/io.github.gedejong.auto_rotate.desktop
      - install -Dm644 io.github.gedejong.auto_rotate.metainfo.xml
        /app/share/metainfo/io.github.gedejong.auto_rotate.metainfo.xml
      - install -Dm644 io.github.gedejong.auto_rotate.png
        /app/share/icons/hicolor/512x512/apps/io.github.gedejong.auto_rotate.png
    sources:
      - type: file
        path: io.github.gedejong.auto_rotate.desktop
      - type: file
        path: io.github.gedejong.auto_rotate.metainfo.xml
      - type: file
        path: io.github.gedejong.auto_rotate.png
