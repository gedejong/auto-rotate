name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: Sync
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type-check
        run: uv run pyright
      - name: Test
        run: uv run pytest

  integration:
    name: integration (real tesseract/ocrmypdf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system binaries
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-osd ocrmypdf
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Sync
        run: uv sync
      - name: Integration tests
        # --no-cov: this job runs only the single end-to-end test, so the suite-wide
        # coverage floor in pyproject's addopts doesn't apply here.
        run: uv run pytest -m integration --no-cov
