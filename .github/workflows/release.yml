name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release and upload assets
  id-token: write # PyPI Trusted Publishing (OIDC) — no API token needed

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - name: Publish (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Re-tagging a version (e.g. to re-run installers) shouldn't fail on an
          # already-published file.
          skip-existing: true

  installers:
    name: ${{ matrix.briefcase-platform }} installer
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, briefcase-platform: windows }
          - { os: macos-latest, briefcase-platform: macOS }
          - { os: ubuntu-latest, briefcase-platform: linux }
    runs-on: ${{ matrix.os }}
    # Map signing secrets to env vars; `if:` can test env but not the secrets context.
    env:
      MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      # macOS: sign + notarize when an Apple Developer identity is configured,
      # otherwise ad-hoc sign so the .dmg still builds (Gatekeeper warns on first open).
      - name: Package (macOS, signed)
        if: matrix.briefcase-platform == 'macOS' && env.MACOS_SIGNING_IDENTITY != ''
        run: |
          uvx briefcase create macOS
          uvx briefcase build macOS
          uvx briefcase package macOS --identity "$MACOS_SIGNING_IDENTITY"
      - name: Package (macOS, ad-hoc)
        if: matrix.briefcase-platform == 'macOS' && env.MACOS_SIGNING_IDENTITY == ''
        run: |
          uvx briefcase create macOS
          uvx briefcase build macOS
          uvx briefcase package macOS --adhoc-sign

      # Windows: code-sign via the WiX/signtool identity when a cert is configured.
      - name: Package (Windows)
        if: matrix.briefcase-platform == 'windows'
        run: |
          uvx briefcase create windows
          uvx briefcase build windows
          uvx briefcase package windows

      # Linux: Briefcase builds the .deb natively on the runner, so the GTK/cairo dev
      # packages it needs (and ghostscript for the GUI's OCR helper) must be present.
      - name: Linux build deps
        if: matrix.briefcase-platform == 'linux'
        # Briefcase's preflight requires the 1.0 dev package by name, while PyGObject
        # 3.56's build needs girepository-2.0 — install both, plus GTK/cairo headers.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-gtk-3.0 libgirepository1.0-dev libgirepository-2.0-dev \
            libgtk-3-dev libcairo2-dev gobject-introspection pkg-config
      - name: Package (Linux)
        if: matrix.briefcase-platform == 'linux'
        run: |
          uvx briefcase create linux
          uvx briefcase build linux
          uvx briefcase package linux

      - name: Attach installers to the release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          fail_on_unmatched_files: true

  homebrew:
    name: Bump Homebrew cask
    needs: installers
    runs-on: ubuntu-latest
    # Requires a fine-grained PAT (contents:write on gedejong/homebrew-auto-rotate)
    # stored as the HOMEBREW_TAP_TOKEN secret. Inert until that secret exists.
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Update cask version + sha256 in the tap
        if: env.TAP_TOKEN != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # Pull the published .dmg and hash it (the cask's checksum).
          mkdir -p /tmp/rel
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --pattern '*.dmg' --dir /tmp/rel
          sha="$(sha256sum /tmp/rel/*.dmg | awk '{print $1}')"
          # Clone the tap and rewrite the version/sha256 stanzas.
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${GITHUB_REPOSITORY_OWNER}/homebrew-auto-rotate.git" tap
          cd tap
          sed -i -E "s/^  version \".*\"/  version \"${version}\"/" Casks/auto-rotate.rb
          sed -i -E "s/^  sha256 \".*\"/  sha256 \"${sha}\"/" Casks/auto-rotate.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/auto-rotate.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date for ${version}."
          else
            git commit -m "auto-rotate ${version}"
            git push
          fi
